name: Export OR-3P3 source

on:
  push:
    branches:
      - feat/alt-or3p3-completion-20260722
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Record branch metadata
        run: |
          set -Eeuo pipefail
          {
            printf 'commit=%s\n' "$(git rev-parse HEAD)"
            printf 'tree=%s\n' "$(git rev-parse 'HEAD^{tree}')"
          } > .or3p3-export-metadata

      - name: Pack source tree
        run: |
          set -Eeuo pipefail
          tar \
            --exclude=.git \
            -czf "${RUNNER_TEMP}/web_ovpn-source.tar.gz" \
            .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: or3p3-source-export
          path: ${{ runner.temp }}/web_ovpn-source.tar.gz
          if-no-files-found: error
          retention-days: 1
