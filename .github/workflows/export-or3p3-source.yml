name: Export OR-3P3 source

on:
  push:
    branches:
      - feat/alt-or3p3-completion-20260722
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack source tree
        run: |
          set -Eeuo pipefail
          tar \
            --exclude=.git \
            -czf "${RUNNER_TEMP}/web_ovpn-source.tar.gz" \
            .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: or3p3-source-export
          path: ${{ runner.temp }}/web_ovpn-source.tar.gz
          if-no-files-found: error
          retention-days: 1
