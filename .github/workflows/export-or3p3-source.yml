name: Export OR-3P3 source

on:
  push:
    branches:
      - feat/alt-or3p3-completion-20260722
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: or3p3-source-${{ github.ref }}
  cancel-in-progress: false

jobs:
  export-source:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply staged task patch
        id: patch
        shell: bash
        run: |
          set -Eeuo pipefail
          trigger=$(find .github/patches -maxdepth 1 -type f -name 'or3p3-*.trigger' | sort | tail -n 1 || true)
          if [[ -z "${trigger}" ]]; then
            echo 'active=false' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          task=$(basename "${trigger}" .trigger)
          mapfile -t patches < <(find .github/patches -maxdepth 1 -type f -name "${task}-*.patch" | sort)
          test "${#patches[@]}" -gt 0
          for patch in "${patches[@]}"; do
            git apply --check "${patch}"
            git apply "${patch}"
          done
          rm -f "${patches[@]}" "${trigger}"
          echo 'active=true' >> "${GITHUB_OUTPUT}"
          echo "task=${task}" >> "${GITHUB_OUTPUT}"

      - name: Install verification dependencies
        if: ${{ steps.patch.outputs.active == 'true' }}
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - name: Run complete ALT Linux suite
        if: ${{ steps.patch.outputs.active == 'true' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest -q tests/alt_linux 2>&1 \
            | tee "${RUNNER_TEMP}/or3p3-pytest.log"

      - name: Run static verification
        if: ${{ steps.patch.outputs.active == 'true' }}
        run: |
          python -m py_compile \
            deploy/alt-linux/backup/alt_deploy_backup/*.py \
            deploy/alt-linux/backup/alt-deploy-backup \
            deploy/alt-linux/control/alt_deploy/*.py \
            deploy/alt-linux/api/*.py
          git diff --check

      - name: Capture failed patch diagnostics
        if: ${{ failure() && steps.patch.outputs.active == 'true' }}
        shell: bash
        run: |
          {
            echo '=== git status ==='
            git status --short
            echo '=== diff stat ==='
            git diff --stat
          } > "${RUNNER_TEMP}/or3p3-git-state.log"

      - name: Upload failed patch diagnostics
        if: ${{ failure() && steps.patch.outputs.active == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: or3p3-patch-failure-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/or3p3-pytest.log
            ${{ runner.temp }}/or3p3-git-state.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit verified patch
        if: ${{ steps.patch.outputs.active == 'true' && success() }}
        shell: bash
        run: |
          set -Eeuo pipefail
          task='${{ steps.patch.outputs.task }}'
          case "${task}" in
            *task1*) message='fix: make OR-3P3 restore recovery durable' ;;
            *task2*) message='feat: gate restore capacity and audit backup commands' ;;
            *task3*) message='feat: guard ALT services during restore and rollout' ;;
            *task4*) message='feat: gate ALT rollout on rehearsed OR-3P3 backup' ;;
            *task5*) message='fix: restrict ALT deployment static assets' ;;
            *task6*) message='docs: finalize OR-3P3 backup and restore evidence' ;;
            *) message='chore: apply OR-3P3 task patch' ;;
          esac
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "${message} [or3p3-applied]"
          git push origin HEAD:feat/alt-or3p3-completion-20260722

      - name: Record branch metadata
        if: ${{ success() }}
        run: |
          set -Eeuo pipefail
          {
            printf 'commit=%s\n' "$(git rev-parse HEAD)"
            printf 'tree=%s\n' "$(git rev-parse 'HEAD^{tree}')"
          } > .or3p3-export-metadata

      - name: Pack source tree
        if: ${{ success() }}
        run: |
          set -Eeuo pipefail
          tar \
            --exclude=.git \
            -czf "${RUNNER_TEMP}/web_ovpn-source.tar.gz" \
            .

      - name: Upload source artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: or3p3-source-export
          path: ${{ runner.temp }}/web_ovpn-source.tar.gz
          if-no-files-found: error
          retention-days: 1
