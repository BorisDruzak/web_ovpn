name: OR-1 branch verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - docs/alt-or1-test-harness-design-20260720
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Focused OR-1 tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/alt_linux/test_operational_reliability_contract.py \
            tests/alt_linux/test_operational_reliability_scenarios.py \
            | tee pytest-or1-focused.log

      - name: ALT Linux suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/alt_linux \
            | tee pytest-alt-linux.log

      - name: Full test suite
        run: python -m pytest -q

      - name: Diff check
        run: git diff --check origin/main...HEAD

      - name: Upload OR-1 verification output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: or1-verification-output
          path: |
            pytest-or1-focused.log
            pytest-alt-linux.log
          if-no-files-found: error
          retention-days: 7
