name: OR-2A verification

on:
  push:
    branches:
      - docs/alt-or2a-ssh-preflight-classification-design-20260720
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install ansible-core
      - name: Focused OR-2A tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/alt_linux/test_or2a_preflight_failures.py \
            tests/alt_linux/test_operational_reliability_contract.py \
            | tee focused.log
      - name: ALT Linux suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/alt_linux | tee alt.log
      - name: Full repository suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q | tee full.log
      - name: Ansible preflight syntax
        shell: bash
        run: |
          printf '%s\n' 'test-only-vault-password' > /tmp/or2a-vault-pass
          chmod 600 /tmp/or2a-vault-pass
          env \
            ANSIBLE_CONFIG=deploy/alt-linux/ansible/ansible.cfg \
            ANSIBLE_VAULT_PASSWORD_FILE=/tmp/or2a-vault-pass \
            ansible-playbook --syntax-check \
            deploy/alt-linux/ansible/playbooks/01-preflight.yml
      - name: Diff check
        run: git diff --check origin/main...HEAD
      - name: Build evidence summary
        if: always()
        shell: bash
        run: |
          touch focused.log alt.log full.log
          {
            echo "head_sha=${GITHUB_SHA}"
            grep -E "passed|failed|error|warning" focused.log | tail -n 2 || true
            grep -E "passed|failed|error|warning" alt.log | tail -n 2 || true
            grep -E "passed|failed|error|warning" full.log | tail -n 2 || true
          } > or2a-summary.txt
      - name: Upload OR-2A evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: or2a-verification-output
          path: |
            focused.log
            alt.log
            full.log
            or2a-summary.txt
          if-no-files-found: error
          retention-days: 7
