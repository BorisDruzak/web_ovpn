name: OR-2A syntax diagnostic

on:
  push:
    branches:
      - docs/alt-or2a-ssh-preflight-classification-design-20260720
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Ansible
        run: python -m pip install ansible-core
      - name: Compare syntax-check working directories
        shell: bash
        run: |
          set +e
          printf '%s\n' 'test-only-vault-password' > /tmp/or2a-vault-pass
          chmod 600 /tmp/or2a-vault-pass

          echo "root_pwd=$(pwd)" > syntax-status.txt
          env \
            ANSIBLE_CONFIG=deploy/alt-linux/ansible/ansible.cfg \
            ANSIBLE_VAULT_PASSWORD_FILE=/tmp/or2a-vault-pass \
            ansible-playbook --syntax-check \
            deploy/alt-linux/ansible/playbooks/01-preflight.yml \
            > syntax-root.log 2>&1
          root_rc=$?
          echo "root_rc=${root_rc}" >> syntax-status.txt

          (
            cd deploy/alt-linux/ansible
            echo "ansible_pwd=$(pwd)" >> "$GITHUB_WORKSPACE/syntax-status.txt"
            env \
              ANSIBLE_CONFIG=ansible.cfg \
              ANSIBLE_VAULT_PASSWORD_FILE=/tmp/or2a-vault-pass \
              ansible-playbook --syntax-check playbooks/01-preflight.yml \
              > "$GITHUB_WORKSPACE/syntax-cwd.log" 2>&1
          )
          cwd_rc=$?
          echo "cwd_rc=${cwd_rc}" >> syntax-status.txt
          cat syntax-status.txt
      - name: Upload syntax diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: or2a-syntax-diagnostic
          path: |
            syntax-status.txt
            syntax-root.log
            syntax-cwd.log
          if-no-files-found: error
          retention-days: 7
