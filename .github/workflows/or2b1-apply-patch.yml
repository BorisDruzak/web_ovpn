name: OR-2B1 apply scoped patch

on:
  push:
    branches:
      - docs/alt-or2b1-vault-health-gate-design-20260720
    paths:
      - tools/or2b1_apply_patch.py
      - .github/workflows/or2b1-apply-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alt-or2b1-vault-health-gate-design-20260720
          fetch-depth: 0
      - name: Apply exact provision patch
        run: python tools/or2b1_apply_patch.py
      - name: Commit generated production change
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --exit-code -- tools/or2b1_apply_patch.py .github/workflows/or2b1-apply-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/alt-linux/control/alt_deploy/provision.py
          git commit -m "fix: gate provisioning on Vault health [or2b1-generated]"
          git push origin HEAD:docs/alt-or2b1-vault-health-gate-design-20260720
