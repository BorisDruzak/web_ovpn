name: OR-2B1 fix documentation paths

on:
  push:
    branches:
      - docs/alt-or2b1-vault-health-gate-design-20260720
    paths:
      - tools/or2b1_fix_doc_paths.py
      - .github/workflows/or2b1-fix-doc-paths.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alt-or2b1-vault-health-gate-design-20260720
          fetch-depth: 0
      - name: Correct documentation paths
        run: python tools/or2b1_fix_doc_paths.py
      - name: Commit documentation correction
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/superpowers/specs/2026-07-20-alt-or2b1-vault-health-gate-design.md
          git add docs/superpowers/plans/2026-07-20-alt-or2b1-vault-health-gate.md
          git commit -m "docs: correct OR-2B1 Vault test path [or2b1-generated]"
          git push origin HEAD:docs/alt-or2b1-vault-health-gate-design-20260720
