name: OR-2B1 patch legacy fixture

on:
  push:
    branches:
      - docs/alt-or2b1-vault-health-gate-design-20260720
    paths:
      - tools/or2b1_patch_legacy_vault_fixture.py
      - .github/workflows/or2b1-patch-legacy-fixture.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alt-or2b1-vault-health-gate-design-20260720
          fetch-depth: 0
      - name: Apply exact legacy fixture patch
        run: python tools/or2b1_patch_legacy_vault_fixture.py
      - name: Commit test fixture update
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --exit-code -- tools/or2b1_patch_legacy_vault_fixture.py .github/workflows/or2b1-patch-legacy-fixture.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/alt_linux/test_provision_preview.py
          git commit -m "test: secure legacy Vault fixture [or2b1-generated]"
          git push origin HEAD:docs/alt-or2b1-vault-health-gate-design-20260720
