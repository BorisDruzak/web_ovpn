name: OR-2B1 verification

on:
  push:
    branches:
      - docs/alt-or2b1-vault-health-gate-design-20260720
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Focused OR-2B1 tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/alt_linux/test_or2b1_vault_gate.py \
            tests/alt_linux/test_or2b1_vault_provision_gate.py \
            tests/alt_linux/test_vault_check.py \
            tests/alt_linux/test_operational_reliability_contract.py \
            2>&1 | tee focused.log
      - name: ALT Linux suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q tests/alt_linux 2>&1 | tee alt.log
      - name: Full repository suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee full.log
      - name: Compile changed production modules
        run: >-
          python -m py_compile
          deploy/alt-linux/control/alt_deploy/vault.py
          deploy/alt-linux/control/alt_deploy/provision.py
      - name: Diff check
        run: git diff --check origin/main...HEAD
      - name: Build evidence summary
        if: always()
        shell: bash
        run: |
          touch focused.log alt.log full.log
          {
            echo "head_sha=${GITHUB_SHA}"
            grep -E "passed|failed|error|warning" focused.log | tail -n 2 || true
            grep -E "passed|failed|error|warning" alt.log | tail -n 2 || true
            grep -E "passed|failed|error|warning" full.log | tail -n 2 || true
          } > or2b1-summary.txt
      - name: Upload OR-2B1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: or2b1-verification-output
          path: |
            focused.log
            alt.log
            full.log
            or2b1-summary.txt
          if-no-files-found: error
          retention-days: 7
