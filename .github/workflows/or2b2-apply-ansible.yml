name: OR-2B2 apply ansible

on:
  push:
    branches:
      - docs/alt-or2b2-runtime-permissions-design-20260720
    paths:
      - tools/or2b2_patch_ansible.py
      - .github/workflows/or2b2-apply-ansible.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alt-or2b2-runtime-permissions-design-20260720
          fetch-depth: 0
      - name: Apply exact ansible patch
        run: python tools/or2b2_patch_ansible.py
      - name: Commit production change
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --exit-code -- tools/or2b2_patch_ansible.py .github/workflows/or2b2-apply-ansible.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/alt-linux/control/alt_deploy/ansible.py
          git commit -m "fix: reject non-executable ALT stage helper [or2b2-generated]"
          git push origin HEAD:docs/alt-or2b2-runtime-permissions-design-20260720
