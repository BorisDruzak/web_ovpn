name: OR-2B2 apply outcomes

on:
  push:
    branches:
      - docs/alt-or2b2-runtime-permissions-design-20260720
    paths:
      - tools/or2b2_patch_outcomes.py
      - .github/workflows/or2b2-apply-outcomes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alt-or2b2-runtime-permissions-design-20260720
          fetch-depth: 0
      - name: Apply exact outcome patch
        run: python tools/or2b2_patch_outcomes.py
      - name: Commit outcome changes
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --exit-code -- tools/or2b2_patch_outcomes.py .github/workflows/or2b2-apply-outcomes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/alt_linux/support/outcomes.py
          git add tests/alt_linux/test_operational_reliability_contract.py
          git commit -m "test: define OR-2B2 operational outcomes [or2b2-generated]"
          git push origin HEAD:docs/alt-or2b2-runtime-permissions-design-20260720
