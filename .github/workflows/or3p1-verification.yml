name: OR-3P1 verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  final-verification:
    runs-on: ubuntu-latest
    env:
      EVIDENCE_DIR: ${{ runner.temp }}/or3p1-verification
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt
      - name: Record tested revisions
        run: |
          mkdir -p "$EVIDENCE_DIR"
          printf 'tested_head=%s\n' "$(git rev-parse HEAD)" | tee "$EVIDENCE_DIR/verification-revisions.txt"
          printf 'main=%s\n' "$(git rev-parse origin/main)" | tee -a "$EVIDENCE_DIR/verification-revisions.txt"
      - name: Run focused OR-3P1 suite
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/alt_linux/test_or3p1_cli_readiness.py \
            tests/alt_linux/test_or3p1_controller_readiness.py \
            tests/alt_linux/test_or3p1_controller_readiness_failures.py \
            tests/alt_linux/test_or3p1_installer.py \
            tests/alt_linux/test_or3p1_installer_failure_phase.py \
            | tee "$EVIDENCE_DIR/verification-focused.txt"
      - name: Run complete ALT suite
        run: |
          set -o pipefail
          python -m pytest -q tests/alt_linux \
            | tee "$EVIDENCE_DIR/verification-alt.txt"
      - name: Run complete repository suite
        run: |
          set -o pipefail
          python -m pytest -q \
            | tee "$EVIDENCE_DIR/verification-full.txt"
      - name: Compile production Python boundaries
        run: |
          python3 -m py_compile \
            deploy/alt-linux/control/alt_deploy/*.py \
            deploy/alt-linux/api/register_api.py \
            deploy/alt-linux/api/process_pending.py \
            deploy/alt-linux/control/alt-job-stage
      - name: Check shell syntax
        run: |
          bash -n deploy/alt-linux/install-control-plane.sh
          bash -n deploy/alt-linux/install-control-plane-lib.sh
          bash -n deploy/alt-linux/bootstrap/bootstrap.sh
      - name: Check Ansible syntax with CI-safe fixture
        run: |
          vault_file=deploy/alt-linux/ansible/group_vars/vault.yml
          vault_pass=/tmp/or3p1-vault-pass
          trap 'rm -f "$vault_file" "$vault_pass"' EXIT
          printf 'or3p1-ci-only\n' > "$vault_pass"
          cat > "$vault_file" <<'EOF'
          ---
          vault_employee_password_hash: '$y$j9T$or3p1-ci$or3p1-ci'
          EOF
          ANSIBLE_CONFIG="$PWD/deploy/alt-linux/ansible/ansible.cfg" \
          ANSIBLE_VAULT_PASSWORD_FILE="$vault_pass" \
            ansible-playbook --syntax-check \
            deploy/alt-linux/ansible/playbooks/01-preflight.yml
          ANSIBLE_CONFIG="$PWD/deploy/alt-linux/ansible/ansible.cfg" \
          ANSIBLE_VAULT_PASSWORD_FILE="$vault_pass" \
            ansible-playbook --syntax-check \
            deploy/alt-linux/ansible/playbooks/02-provision-account.yml
          rm -f "$vault_file" "$vault_pass"
          trap - EXIT
      - name: Check diff integrity and temporary state
        run: |
          git diff --check origin/main...HEAD
          test -z "$(git status --short)"
          test ! -e deploy/alt-linux/ansible/group_vars/vault.yml
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: or3p1-verification
          path: ${{ runner.temp }}/or3p1-verification
          if-no-files-found: warn
