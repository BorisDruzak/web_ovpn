name: OR-3P1 verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  phase-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/alt-or3p1-pilot-installer-readiness-20260721
      - name: Apply exact post-maintenance phase patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("deploy/alt-linux/install-control-plane-lib.sh")
          text = path.read_text(encoding="utf-8")
          if "run_post_maintenance_step()" in text:
              raise SystemExit(0)

          old = '''install_control_plane_main() {
              local root_prefix=$1

              install_control_plane_prechecks "${root_prefix}"
              enter_control_plane_maintenance
              install_controller_package "${root_prefix}"
              ensure_private_state_directories "${root_prefix}"
              install_ansible_project "${root_prefix}"
              install_registration_runtime "${root_prefix}"
              install_systemd_units "${root_prefix}"
              activate_control_plane
              run_installed_readiness "${root_prefix}"

              echo "ALT deployment control plane installed successfully"
          }
          '''
          new = '''run_post_maintenance_step() {
              local phase=$1
              shift

              if (
                  set -Eeuo pipefail
                  "$@"
              ); then
                  return 0
              fi

              echo "ALT control-plane installation failed during ${phase}; restore the OR-3P3 backup before retrying" >&2
              return 1
          }

          install_control_plane_main() {
              local root_prefix=$1

              install_control_plane_prechecks "${root_prefix}"
              run_post_maintenance_step maintenance enter_control_plane_maintenance
              run_post_maintenance_step controller_package install_controller_package "${root_prefix}"
              run_post_maintenance_step private_state ensure_private_state_directories "${root_prefix}"
              run_post_maintenance_step ansible_project install_ansible_project "${root_prefix}"
              run_post_maintenance_step registration_runtime install_registration_runtime "${root_prefix}"
              run_post_maintenance_step systemd_units install_systemd_units "${root_prefix}"
              run_post_maintenance_step activation activate_control_plane
              run_post_maintenance_step readiness run_installed_readiness "${root_prefix}"

              echo "ALT deployment control plane installed successfully"
          }
          '''
          if old not in text:
              raise SystemExit("expected install_control_plane_main block not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit phase patch
        run: |
          git config user.name "OpenAI OR-3P1 automation"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then
            exit 0
          fi
          git add deploy/alt-linux/install-control-plane-lib.sh
          git diff --cached --check
          git commit -m "fix: report OR-3P1 post-maintenance failure phase"
          git push origin HEAD:feat/alt-or3p1-pilot-installer-readiness-20260721

  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt
      - name: Run OR-3P1 focused tests
        run: |
          python -m pytest -q \
            tests/alt_linux/test_or3p1_cli_readiness.py \
            tests/alt_linux/test_or3p1_controller_readiness.py \
            tests/alt_linux/test_or3p1_controller_readiness_failures.py \
            tests/alt_linux/test_or3p1_installer.py \
            tests/alt_linux/test_or3p1_installer_failure_phase.py
