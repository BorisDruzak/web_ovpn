name: OR-3P1 verification

on:
  push:
    branches:
      - feat/alt-or3p1-pilot-installer-readiness-20260721
  pull_request:
    branches:
      - main

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt
      - name: Run OR-3P1 focused tests
        run: python -m pytest -q tests/alt_linux/test_or3p1_cli_readiness.py
