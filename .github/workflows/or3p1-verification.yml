name: OR-3P1 verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/alt-or3p1-pilot-installer-readiness-20260721
      - name: Restore exact dependency documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("deploy/alt-linux/README.md")
          text = path.read_text(encoding="utf-8")
          old = (
              "The public installer requires root before loading deployment logic. Before the\n"
              "first runtime mutation, the installer validates all required commands and source\n"
              "assets, the `altserver` account, Python and shell syntax, `tests/alt_linux`,\n"
              "active jobs, Vault, controller permissions, SSH identity, static autoinstall\n"
              "assets, the pending registration queue and processor inactivity.\n"
          )
          new = (
              "The public installer requires root before loading deployment logic. Before the\n"
              "first runtime mutation, the installer validates all required commands, including\n"
              "`systemd-run` and `ssh-keyscan`, every source asset, the `altserver` account,\n"
              "Python and shell syntax, `tests/alt_linux`, active jobs, Vault, controller\n"
              "permissions, SSH identity, static autoinstall assets, the pending registration\n"
              "queue and processor inactivity.\n"
          )
          if new in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit("expected OR-3P1 dependency paragraph not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit documentation fix
        run: |
          git config user.name "OpenAI OR-3P1 automation"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then
            exit 0
          fi
          git add deploy/alt-linux/README.md
          git diff --cached --check
          git commit -m "docs: restore OR-3P1 dependency contract"
          git push origin HEAD:feat/alt-or3p1-pilot-installer-readiness-20260721

  final-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt
      - name: Record tested revisions
        run: |
          printf 'tested_head=%s\n' "$(git rev-parse HEAD)" | tee verification-revisions.txt
          printf 'main=%s\n' "$(git rev-parse origin/main)" | tee -a verification-revisions.txt
      - name: Run focused OR-3P1 suite
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/alt_linux/test_or3p1_cli_readiness.py \
            tests/alt_linux/test_or3p1_controller_readiness.py \
            tests/alt_linux/test_or3p1_controller_readiness_failures.py \
            tests/alt_linux/test_or3p1_installer.py \
            tests/alt_linux/test_or3p1_installer_failure_phase.py \
            | tee verification-focused.txt
      - name: Run complete ALT suite
        run: |
          set -o pipefail
          python -m pytest -q tests/alt_linux \
            | tee verification-alt.txt
      - name: Run complete repository suite
        run: |
          set -o pipefail
          python -m pytest -q \
            | tee verification-full.txt
      - name: Compile production Python boundaries
        run: |
          python3 -m py_compile \
            deploy/alt-linux/control/alt_deploy/*.py \
            deploy/alt-linux/api/register_api.py \
            deploy/alt-linux/api/process_pending.py \
            deploy/alt-linux/control/alt-job-stage
      - name: Check shell syntax
        run: |
          bash -n deploy/alt-linux/install-control-plane.sh
          bash -n deploy/alt-linux/install-control-plane-lib.sh
          bash -n deploy/alt-linux/bootstrap/bootstrap.sh
      - name: Check Ansible syntax with CI-safe fixture
        run: |
          vault_file=deploy/alt-linux/ansible/group_vars/vault.yml
          vault_pass=/tmp/or3p1-vault-pass
          trap 'rm -f "$vault_file" "$vault_pass"' EXIT
          printf 'or3p1-ci-only\n' > "$vault_pass"
          cat > "$vault_file" <<'EOF'
          ---
          vault_employee_password_hash: '$y$j9T$or3p1-ci$or3p1-ci'
          EOF
          ANSIBLE_CONFIG="$PWD/deploy/alt-linux/ansible/ansible.cfg" \
          ANSIBLE_VAULT_PASSWORD_FILE="$vault_pass" \
            ansible-playbook --syntax-check \
            deploy/alt-linux/ansible/playbooks/01-preflight.yml
          ANSIBLE_CONFIG="$PWD/deploy/alt-linux/ansible/ansible.cfg" \
          ANSIBLE_VAULT_PASSWORD_FILE="$vault_pass" \
            ansible-playbook --syntax-check \
            deploy/alt-linux/ansible/playbooks/02-provision-account.yml
          rm -f "$vault_file" "$vault_pass"
          trap - EXIT
      - name: Check diff integrity and temporary state
        run: |
          git diff --check origin/main...HEAD
          test -z "$(git status --short)"
          test ! -e deploy/alt-linux/ansible/group_vars/vault.yml
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: or3p1-verification
          path: |
            verification-revisions.txt
            verification-focused.txt
            verification-alt.txt
            verification-full.txt
          if-no-files-found: warn
