name: Temporary OR-3P2 Verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: OR-3P2 foundation
        run: >-
          python -m pytest -q
          tests/alt_linux/test_registration_records.py
          tests/alt_linux/test_machine_archive_repository.py
          tests/alt_linux/test_machine_lifecycle.py
          tests/alt_linux/test_machine_registry_generations.py
          tests/alt_linux/test_machine_archive_service.py
          tests/alt_linux/test_machine_archive_cli.py
          tests/alt_linux/test_registration_admission.py
          tests/alt_linux/test_register_api.py
      - name: Existing pending processor contracts
        run: python -m pytest -q tests/alt_linux/test_process_pending.py
      - name: Pending lifecycle race contracts
        run: python -m pytest -q tests/alt_linux/test_process_pending_lifecycle.py
