name: Temporary OR-3P2 Verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Foundation and existing processor
        run: >-
          python -m pytest -q
          tests/alt_linux/test_registration_records.py
          tests/alt_linux/test_machine_archive_repository.py
          tests/alt_linux/test_machine_lifecycle.py
          tests/alt_linux/test_machine_registry_generations.py
          tests/alt_linux/test_machine_archive_service.py
          tests/alt_linux/test_machine_archive_cli.py
          tests/alt_linux/test_registration_admission.py
          tests/alt_linux/test_register_api.py
          tests/alt_linux/test_process_pending.py
      - name: Committed ready suppression
        run: python -m pytest -q tests/alt_linux/test_process_pending_lifecycle.py::test_committed_generation_cannot_finalize_ready
      - name: Committed failed suppression
        run: python -m pytest -q tests/alt_linux/test_process_pending_lifecycle.py::test_committed_generation_cannot_finalize_failed
      - name: New generation replacement
        run: python -m pytest -q tests/alt_linux/test_process_pending_lifecycle.py::test_new_generation_replacing_source_is_untouched
      - name: Lock duration
        run: python -m pytest -q tests/alt_linux/test_process_pending_lifecycle.py::test_long_running_work_occurs_outside_global_lock
