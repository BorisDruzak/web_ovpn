name: Temporary OR-3P2 Task 1

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Focused registration record contracts
        run: python -m pytest -q tests/alt_linux/test_registration_records.py
      - name: Neighboring provisioning regression
        run: >-
          python -m pytest -q
          tests/alt_linux/test_provision_preview.py
          tests/alt_linux/test_provision_start.py
          tests/alt_linux/test_registry_cli.py
