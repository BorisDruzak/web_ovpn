name: Temporary OR-3P2 Verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Functional foundation and archive root safety
        run: >-
          python -m pytest -q
          tests/alt_linux/test_registration_records.py
          tests/alt_linux/test_machine_archive_repository.py
          tests/alt_linux/test_machine_lifecycle.py
          tests/alt_linux/test_machine_registry_generations.py
          tests/alt_linux/test_machine_archive_service.py
          tests/alt_linux/test_machine_archive_cli.py
          tests/alt_linux/test_registration_admission.py
          tests/alt_linux/test_register_api.py
          tests/alt_linux/test_process_pending.py
          tests/alt_linux/test_process_pending_lifecycle.py
          tests/alt_linux/test_alt_bootstrap_register.py
          tests/alt_linux/test_bootstrap_register_integration.py
          tests/alt_linux/test_machine_archive_root_safety.py
      - name: Helper publication and archive preservation
        run: python -m pytest -q tests/alt_linux/test_or3p2_installer_runtime.py::test_installer_publishes_helper_and_preserves_archives
      - name: Private roots and lock
        run: python -m pytest -q tests/alt_linux/test_or3p2_installer_runtime.py::test_installer_creates_private_archive_roots_and_lock
      - name: Source declarations
        run: python -m pytest -q tests/alt_linux/test_or3p2_installer_runtime.py::test_installer_source_validates_and_publishes_helper
      - name: Unit sandbox declarations
        run: python -m pytest -q tests/alt_linux/test_or3p2_installer_runtime.py::test_installed_units_allow_only_required_lifecycle_roots
      - name: Readiness contracts
        run: >-
          python -m pytest -q
          tests/alt_linux/test_or3p1_controller_readiness.py
          tests/alt_linux/test_or3p1_controller_readiness_failures.py
