name: Temporary OR-3P2 Whitespace Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Remove trailing whitespace
        shell: bash
        run: |
          set -Eeuo pipefail
          sed -i 's/[[:space:]]\+$//' \
            docs/superpowers/plans/2026-07-21-alt-or3p2-machine-registry-lifecycle-amendment.md \
            docs/superpowers/specs/2026-07-21-alt-or3p2-machine-registry-lifecycle-design.md \
            tests/alt_linux/support/register_helper_sandbox.py
          git diff --check
      - name: Commit normalized files
        shell: bash
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            docs/superpowers/plans/2026-07-21-alt-or3p2-machine-registry-lifecycle-amendment.md \
            docs/superpowers/specs/2026-07-21-alt-or3p2-machine-registry-lifecycle-design.md \
            tests/alt_linux/support/register_helper_sandbox.py
          git commit -m 'style: normalize OR-3P2 whitespace'
          git push origin HEAD:${{ github.head_ref }}
