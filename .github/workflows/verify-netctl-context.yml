name: Verify netctl context stage

on:
  pull_request:
    paths:
      - "netctl/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/verify-netctl-context.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  context-stage:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - name: Run context-stage tests
        run: python -m pytest -q tests/test_netctl_context.py

  full-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - name: Run full regression suite
        run: python -m pytest -q --maxfail=20
