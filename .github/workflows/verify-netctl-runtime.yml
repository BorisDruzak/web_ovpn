name: Verify netctl runtime identity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-runtime-identity:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --quiet --upgrade pip
      - run: python -m pip install --quiet -r requirements.txt
      - run: >-
          python -m pytest -q
          tests/test_netctl_runtime_assets.py
          tests/test_netctl_context_import.py
          tests/test_netctl_context_migrations.py
          tests/test_netctl_source_identity.py
          tests/test_netctl_topology.py
          tests/test_netctl_cli.py
          tests/test_netctl_snmp_config.py
          tests/test_netctl_snmp_transport.py
          tests/test_netctl_snmp_parsers.py
          tests/test_netctl_snmp_profiles.py
          tests/test_netctl_switch_store.py
          tests/test_netctl_switch_cli.py

  full-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --quiet --upgrade pip
      - run: python -m pip install --quiet -r requirements.txt
      - name: Run and retain full pytest output
        shell: bash
        run: |
          set +e
          python -m pytest -q > pytest-full.log 2>&1
          rc=$?
          echo "$rc" > pytest-full.exit-code
          cat pytest-full.log
          exit "$rc"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-full-runtime-identity
          path: |
            pytest-full.log
            pytest-full.exit-code
          if-no-files-found: error
          retention-days: 14
