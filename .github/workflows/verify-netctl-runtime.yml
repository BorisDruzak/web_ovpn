name: Verify netctl runtime identity

on:
  push:
    branches:
      - main
      - feat/alt-or3p3-completion-20260722
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  focused-runtime-identity:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --quiet --upgrade pip
      - run: python -m pip install --quiet -r requirements.txt
      - run: >-
          python -m pytest -q
          tests/test_netctl_runtime_assets.py
          tests/test_netctl_context_import.py
          tests/test_netctl_context_migrations.py
          tests/test_netctl_cli.py
          tests/test_netctl_snmp_config.py
          tests/test_netctl_snmp_transport.py
          tests/test_netctl_snmp_parsers.py
          tests/test_netctl_snmp_profiles.py
          tests/test_netctl_switch_store.py
          tests/test_netctl_switch_cli.py

  full-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --quiet --upgrade pip
      - run: python -m pip install --quiet -r requirements.txt
      - name: Run and retain full pytest output
        shell: bash
        run: |
          set +e
          python -m pytest -q > pytest-full.log 2>&1
          rc=$?
          echo "$rc" > pytest-full.exit-code
          cat pytest-full.log
          exit "$rc"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-full-runtime-identity
          path: |
            pytest-full.log
            pytest-full.exit-code
          if-no-files-found: error
          retention-days: 14

  final-or3p3-gate:
    needs:
      - focused-runtime-identity
      - full-regression
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require standard jobs
        shell: bash
        run: |
          test '${{ needs.focused-runtime-identity.result }}' = success
          test '${{ needs.full-regression.result }}' = success

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet 'ansible-core>=2.16,<2.18'

      - name: Run focused OR-3P3 verification
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest -q \
            tests/alt_linux/test_or3p3_backup_cli.py \
            tests/alt_linux/test_or3p3_backup_fs.py \
            tests/alt_linux/test_or3p3_backup_secrets.py \
            tests/alt_linux/test_or3p3_backup_systemd.py \
            tests/alt_linux/test_or3p3_backup_manifest.py \
            tests/alt_linux/test_or3p3_backup_archive.py \
            tests/alt_linux/test_or3p3_backup_create.py \
            tests/alt_linux/test_or3p3_backup_verify_list_delete.py \
            tests/alt_linux/test_or3p3_backup_rehearsal.py \
            tests/alt_linux/test_or3p3_backup_restore.py \
            tests/alt_linux/test_or3p3_backup_guard.py \
            tests/alt_linux/test_or3p3_backup_installer.py \
            tests/alt_linux/test_or3p3_control_plane_gate.py \
            tests/alt_linux/test_static_server.py \
            2>&1 | tee "${RUNNER_TEMP}/or3p3-focused.log"

      - name: Run complete ALT Linux suite
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest -q tests/alt_linux 2>&1 \
            | tee "${RUNNER_TEMP}/or3p3-alt-linux.log"

      - name: Run Python and Bash gates
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m py_compile \
            deploy/alt-linux/backup/alt_deploy_backup/*.py \
            deploy/alt-linux/backup/alt-deploy-backup \
            deploy/alt-linux/control/alt_deploy/*.py \
            deploy/alt-linux/api/static_server.py \
            deploy/alt-linux/api/register_api.py \
            deploy/alt-linux/api/process_pending.py
          for path in \
            deploy/alt-linux/install-backup-tool.sh \
            deploy/alt-linux/install-backup-tool-lib.sh \
            deploy/alt-linux/install-control-plane.sh \
            deploy/alt-linux/install-control-plane-args.sh \
            deploy/alt-linux/install-control-plane-lib.sh \
            deploy/alt-linux/bootstrap/bootstrap.sh \
            deploy/alt-linux/bootstrap/alt-bootstrap-register; do
            bash -n "${path}"
          done

      - name: Run systemd gate
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo install -d -m 0755 /usr/local/sbin
          sudo install -m 0755 /bin/true /usr/local/sbin/alt-deploy-backup
          trap 'sudo rm -f /usr/local/sbin/alt-deploy-backup' EXIT
          systemd-analyze verify \
            deploy/alt-linux/backup/alt-deploy-guard.service \
            deploy/alt-linux/systemd/alt-deploy-http.service \
            deploy/alt-linux/systemd/alt-deploy-register.service \
            deploy/alt-linux/systemd/alt-deploy-process.path \
            deploy/alt-linux/systemd/alt-deploy-process.service \
            2>&1 | tee "${RUNNER_TEMP}/or3p3-systemd.log"

      - name: Run Ansible syntax gates
        shell: bash
        run: |
          set -Eeuo pipefail
          vault=deploy/alt-linux/ansible/group_vars/vault.yml
          cp deploy/alt-linux/ansible/group_vars/vault.yml.example "${vault}"
          trap 'rm -f "${vault}"' EXIT
          export ANSIBLE_CONFIG="${PWD}/deploy/alt-linux/ansible/ansible.cfg"
          ansible-playbook \
            --syntax-check \
            --inventory 'localhost,' \
            --vault-password-file /dev/null \
            deploy/alt-linux/ansible/playbooks/01-preflight.yml \
            2>&1 | tee "${RUNNER_TEMP}/or3p3-ansible-preflight.log"
          ansible-playbook \
            --syntax-check \
            --inventory 'localhost,' \
            --vault-password-file /dev/null \
            deploy/alt-linux/ansible/playbooks/02-provision-account.yml \
            2>&1 | tee "${RUNNER_TEMP}/or3p3-ansible-provision.log"

      - name: Run repository hygiene gate
        shell: bash
        run: |
          set -Eeuo pipefail
          git diff --check origin/main...HEAD
          test -z "$(git status --short)"

      - name: Upload final verification evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: or3p3-final-verification-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/or3p3-focused.log
            ${{ runner.temp }}/or3p3-alt-linux.log
            ${{ runner.temp }}/or3p3-systemd.log
            ${{ runner.temp }}/or3p3-ansible-preflight.log
            ${{ runner.temp }}/or3p3-ansible-provision.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish run locator
        if: ${{ always() }}
        shell: bash
        run: |
          set -Eeuo pipefail
          cat > .or3p3-final-verification-run.json <<JSON
          {
            "run_id": ${GITHUB_RUN_ID},
            "status": "${{ job.status }}",
            "verified_commit": "${GITHUB_SHA}",
            "workflow": "Verify netctl runtime identity / final-or3p3-gate"
          }
          JSON
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .or3p3-final-verification-run.json
          git commit -m 'ci: record final OR-3P3 verification outcome [skip ci]'
          git push origin HEAD:feat/alt-or3p3-completion-20260722
