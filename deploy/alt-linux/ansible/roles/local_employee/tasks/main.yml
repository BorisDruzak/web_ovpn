---
- name: Inspect existing local employee
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ employee_login }}"
  register: employee_existing
  changed_when: false
  failed_when: false

- name: Normalize existing local employee
  ansible.builtin.set_fact:
    employee_existing_fields: >-
      {{
        (employee_existing.stdout | trim).split(':')
        if employee_existing.rc == 0
        else []
      }}

- name: Validate existing local employee
  ansible.builtin.assert:
    that:
      - employee_existing_fields | length == 0 or employee_existing_fields[2] | int >= 1000
      - employee_existing_fields | length == 0 or employee_existing_fields[5] == '/home/' + employee_login
      - employee_login not in ['root', 'ansible', 'osn-admin']
    fail_msg: Existing local account conflicts with requested employee

- name: Ensure employee primary group exists
  ansible.builtin.group:
    name: "{{ employee_login }}"
    state: present

- name: Create or reconcile local employee
  ansible.builtin.user:
    name: "{{ employee_login }}"
    comment: "{{ employee_full_name }}"
    group: "{{ employee_login }}"
    groups: ""
    append: false
    home: "/home/{{ employee_login }}"
    shell: /bin/bash
    create_home: true
    password: "{{ vault_employee_password_hash }}"
    update_password: always
    password_lock: false
    password_expire_max: 99999
    expires: -1
    state: present
  no_log: true

- name: Read employee groups
  ansible.builtin.command:
    argv:
      - id
      - -nG
      - "{{ employee_login }}"
  register: local_employee_groups
  changed_when: false

- name: Verify employee is not an administrator
  ansible.builtin.assert:
    that:
      - "'wheel' not in local_employee_groups.stdout.split()"
    fail_msg: Employee account is a member of wheel

- name: Check employee sudo authorization
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - -l
      - -U
      - "{{ employee_login }}"
  environment:
    LC_ALL: C
  register: local_employee_sudo
  changed_when: false
  failed_when: false

- name: Reject employee sudo authorization
  ansible.builtin.assert:
    that:
      - local_employee_sudo.rc == 0
      - >-
        'is not allowed to run sudo'
        in
        (
          local_employee_sudo.stdout
          + local_employee_sudo.stderr
        )
    fail_msg: Employee account has sudo authorization
