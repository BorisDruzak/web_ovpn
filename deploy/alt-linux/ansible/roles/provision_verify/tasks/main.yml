---
- name: Read final hostname
  ansible.builtin.command:
    argv:
      - hostnamectl
      - --static
  register: provision_verify_hostname
  changed_when: false

- name: Read employee account
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ employee_login }}"
  register: provision_verify_employee
  changed_when: false
  failed_when: false

- name: Normalize employee account
  ansible.builtin.set_fact:
    provision_verify_employee_fields: >-
      {{
        (provision_verify_employee.stdout | trim).split(':')
        if provision_verify_employee.rc == 0
        else []
      }}

- name: Read employee groups
  ansible.builtin.command:
    argv:
      - id
      - -nG
      - "{{ employee_login }}"
  register: provision_verify_groups
  changed_when: false

- name: Check employee sudo authorization
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - -l
      - -U
      - "{{ employee_login }}"
  environment:
    LC_ALL: C
  register: provision_verify_employee_sudo
  changed_when: false
  failed_when: false

- name: Verify ansible passwordless sudo
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - "true"
  become: false
  register: provision_verify_ansible_sudo
  changed_when: false

- name: Check LightDM service
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - lightdm
  register: provision_verify_lightdm_service
  changed_when: false
  failed_when: false

- name: Check AccountsService daemon
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - accounts-daemon
  register: provision_verify_accounts_daemon
  changed_when: false
  failed_when: false

- name: Read ansible AccountsService record
  ansible.builtin.slurp:
    src: /var/lib/AccountsService/users/ansible
  register: provision_verify_ansible_account_raw

- name: Read employee AccountsService record
  ansible.builtin.slurp:
    src: "/var/lib/AccountsService/users/{{ employee_login }}"
  register: provision_verify_employee_account_raw

- name: Read managed LightDM configuration
  ansible.builtin.slurp:
    src: /etc/lightdm/lightdm.conf.d/90-alt-workstation.conf
  register: provision_verify_lightdm_raw

- name: Normalize LightDM and AccountsService records
  ansible.builtin.set_fact:
    provision_verify_ansible_account: >-
      {{
        provision_verify_ansible_account_raw.content
        | b64decode
      }}
    provision_verify_employee_account: >-
      {{
        provision_verify_employee_account_raw.content
        | b64decode
      }}
    provision_verify_lightdm: >-
      {{
        provision_verify_lightdm_raw.content
        | b64decode
      }}

- name: Verify provisioned workstation state
  ansible.builtin.assert:
    that:
      - provision_verify_hostname.stdout | trim == final_hostname
      - provision_verify_employee.rc == 0
      - provision_verify_employee_fields | length >= 7
      - provision_verify_employee_fields[5] == '/home/' + employee_login
      - provision_verify_employee_fields[6] == '/bin/bash'
      - "'wheel' not in provision_verify_groups.stdout.split()"
      - provision_verify_employee_sudo.rc == 0
      - >-
        'is not allowed to run sudo'
        in
        (
          provision_verify_employee_sudo.stdout
          + provision_verify_employee_sudo.stderr
        )
      - provision_verify_ansible_sudo.rc == 0
      - provision_verify_lightdm_service.stdout | trim == 'active'
      - provision_verify_accounts_daemon.stdout | trim == 'active'
      - "'SystemAccount=true' in provision_verify_ansible_account"
      - "'SystemAccount=false' in provision_verify_employee_account"
      - "'autologin-user=' in provision_verify_lightdm"
      - "'autologin-user-timeout=0' in provision_verify_lightdm"
    fail_msg: Workstation verification failed

- name: Set provision completion time
  ansible.builtin.set_fact:
    provision_completed_at: "{{ ansible_date_time.iso8601 }}"

- name: Create assignment directory
  ansible.builtin.file:
    path: /var/lib/alt-workstation
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Write target assignment record
  ansible.builtin.template:
    src: assignment.json.j2
    dest: /var/lib/alt-workstation/assignment.json
    owner: root
    group: root
    mode: "0600"

- name: Build public provision result
  ansible.builtin.set_fact:
    provision_public_result:
      machine_uuid: "{{ machine_uuid }}"
      final_hostname: "{{ final_hostname }}"
      employee_login: "{{ employee_login }}"
      employee_full_name: "{{ employee_full_name }}"
      profile: "{{ profile }}"
      job_id: "{{ job_id }}"
      completed_at: "{{ provision_completed_at }}"
      verification:
        hostname: true
        employee_exists: true
        employee_not_wheel: true
        employee_no_sudo: true
        ansible_sudo: true
        lightdm_hides_ansible: true
        lightdm_shows_employee: true
        lightdm_autologin_disabled: true

- name: Write provision result on controller
  ansible.builtin.copy:
    content: "{{ provision_public_result | to_nice_json }}"
    dest: "{{ provision_result_file }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true
